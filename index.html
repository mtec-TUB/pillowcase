<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PillowCase</title>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-size: 1rem; font-weight: 700; color: #1a1a2e;
      letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-logo .dot { width: 8px; height: 8px; background: #0066ff; border-radius: 50%; }
    .nav-brand { display: flex; flex-direction: column; gap: 0.05rem; }
    .nav-subtitle { font-size: 0.68rem; color: #9ca3af; font-weight: 400; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; border-radius: 6px; font-size: 0.8rem;
      font-weight: 500; cursor: pointer; border: 1px solid #e2e4e9;
      background: #fff; color: #444; transition: all 0.12s; white-space: nowrap;
    }
    .nav-btn:hover { background: #f4f5f7; border-color: #ccc; }
    .nav-btn.primary { background: #0066ff; color: #fff; border-color: #0066ff; }
    .nav-btn.primary:hover { background: #0052d4; }

    /* ── TABS ── */
    .tab-bar {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 0;
      flex-shrink: 0;
      height: 40px;
    }
    .tab {
      padding: 0 1.1rem 0 1.1rem;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
      gap: 0.4rem;
    }
    .tab.active { color: #0066ff; border-bottom-color: #0066ff; }
    .tab:hover:not(.active) { color: #374151; background: #f9fafb; }
    .tab svg { flex-shrink: 0; }

    /* ── PANES ── */
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .pane.hidden { display: none; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center; gap: 0.4rem;
      border: 1px solid #e2e4e9; border-radius: 6px;
      padding: 0.38rem 0.7rem; background: #f9fafb; flex: 0 0 240px;
    }
    .search-box svg { color: #9ca3af; flex-shrink: 0; }
    .search-box input { border: none; background: transparent; outline: none; font-size: 0.82rem; color: #1a1a2e; width: 100%; }
    .tool-sep { width: 1px; height: 20px; background: #e2e4e9; }
    .col-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .col-chip {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.28rem 0.65rem; border-radius: 20px;
      border: 1px solid #e2e4e9; font-size: 0.74rem;
      cursor: pointer; background: #f9fafb; color: #555; transition: all 0.12s;
    }
    .col-chip.on { background: #e8f0ff; border-color: #0066ff55; color: #0052d4; font-weight: 500; }
    .stats-label { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }
    .stats-label strong { color: #1a1a2e; }

    /* ── GRID WRAP ── */
    .grid-wrap {
      flex: 1; padding: 1rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.75rem; overflow: hidden;
    }
    .ag-grid-el {
      flex: 1; width: 100%; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px #e2e4e9;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: #9ca3af; border-radius: 10px;
      border: 2px dashed #e2e4e9; background: #fff;
    }


    /* ── MODALITY CELL CHIPS ── */
    .mod-cell-val {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 20px; border-radius: 4px;
      font-size: 11px; font-weight: 600; line-height: 1;
      padding: 0 4px;
    }
    .mod-cell-val.present { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .mod-cell-val.optional { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

    /* ── AVAILABILITY ICONS ── */
    .avail-cell {
      display: flex; align-items: center; gap: 0.4rem; height: 100%;
    }
    .avail-icon { flex-shrink: 0; display: flex; align-items: center; }
    .avail-label { font-size: 0.78rem; color: #6b7280; }

    /* ── MODALS ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 2rem; width: 500px; max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal p { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.2rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.2rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      background: #1a1a2e; color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 8px;
      font-size: 0.8rem; z-index: 999;
      opacity: 0; transform: translateY(6px);
      transition: all 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── AG-GRID THEME ── */
    .ag-theme-quartz {
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --ag-font-size: 13px;
      --ag-header-background-color: #f8f9fb;
      --ag-odd-row-background-color: #fff;
      --ag-row-hover-color: #f0f6ff;
      --ag-selected-row-background-color: #e8f0ff;
      --ag-border-color: #e2e4e9;
      --ag-header-column-separator-color: #e2e4e9;
      --ag-cell-horizontal-padding: 14px;
      --ag-row-height: 40px;
      --ag-header-height: 42px;
    }

    /* Modalities grid: compact rows */
    #modalitiesGrid.ag-theme-quartz {
      --ag-row-height: 34px;
      --ag-header-height: 38px;
      --ag-cell-horizontal-padding: 8px;
      --ag-font-size: 12px;
    }

    .expand-icon {
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; width: 100%; height: 100%;
      font-size: 14px; color: #9ca3af; transition: color 0.15s; user-select: none;
    }
    .expand-icon:hover { color: #0066ff; }
    .child-row-cell { color: #6b7280; font-style: italic; }

    /* ── DATASET NAME LINK ── */
    .dataset-link {
      color: #0066ff; cursor: pointer; font-weight: 600;
      text-decoration: none; border-bottom: 1px dashed #0066ff44;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .dataset-link:hover { color: #0052d4; border-bottom-color: #0052d4; }

    /* ── POPULATION POPOVER ── */
    #pop-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: none;
    }
    #pop-overlay.open { display: block; }
    #pop-box {
      position: fixed;
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.07);
      padding: 0.9rem 1.1rem;
      max-width: 320px;
      min-width: 180px;
      z-index: 301;
      pointer-events: auto;
    }
    #pop-box-title {
      font-size: 0.72rem; font-weight: 700; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }
    #pop-box-body {
      font-size: 0.82rem; color: #1a1a2e; line-height: 1.5;
    }
    #pop-box-close {
      position: absolute; top: 0.5rem; right: 0.6rem;
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 14px; line-height: 1; padding: 2px 4px;
      border-radius: 4px;
    }
    #pop-box-close:hover { color: #374151; background: #f4f5f7; }
  </style>
</head>

<!-- ══════════════════════════════════════════════════════════════════ -->
<script>

// ── STATE ─────────────────────────────────────────────────
let gridApi;
let modGridApi;
let columnDefs = [];
let rowIdCounter = 1000;
let currentHeaders = [];
let removedRows = [];
let hierarchyMap = new Map();
let expandedDatasets = new Set();
let activeTab = 'overview';
let accessColName = null; // column whose values are "public" / "upon request"
let populationColName = null; // column describing study population

// ── TAB SWITCHING ──────────────────────────────────────────
function switchTab(name) {
  activeTab = name;
  ['overview', 'modalities'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
    document.getElementById(`pane-${t}`).classList.toggle('hidden', t !== name);
  });
  if (name === 'modalities' && !modGridApi) {
    autoLoadModalitiesCSV();
  }
}

// ── CSV PARSER ────────────────────────────────────────────
function detectDelimiter(text) {
  const firstLine = text.split(/\r?\n/)[0];
  const semicolons = (firstLine.match(/;/g) || []).length;
  const commas     = (firstLine.match(/,/g) || []).length;
  return semicolons >= commas ? ';' : ',';
}

function splitLine(line, delim) {
  const fields = [];
  let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === delim) { fields.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
  }
  fields.push(cur.trim());
  return fields;
}

function parseCSV(text) {
  const delim = detectDelimiter(text);
  const rawLines = [];
  let buf = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') inQ = !inQ;
    if (!inQ && (ch === '\n' || (ch === '\r' && text[i+1] === '\n'))) {
      if (ch === '\r') i++;
      if (buf.trim()) rawLines.push(buf);
      buf = '';
    } else buf += ch;
  }
  if (buf.trim()) rawLines.push(buf);

  // Detect two-row header: row 0 has empty first cell → it's a group-name row
  let groupRow  = null;
  let headerIdx = 0;
  if (rawLines.length > 1) {
    const row0 = splitLine(rawLines[0], delim);
    if (row0[0].trim() === '') {
      groupRow  = row0;
      headerIdx = 1;
    }
  }

  const headers = splitLine(rawLines[headerIdx], delim);
  const rows = [];
  for (let i = headerIdx + 1; i < rawLines.length; i++) {
    const vals = splitLine(rawLines[i], delim);
    const row = { _rowId: ++rowIdCounter };
    let hasData = false;
    headers.forEach((h, idx) => {
      const val = vals[idx] !== undefined ? vals[idx] : '';
      row[h] = val;
      if (val !== '') hasData = true;
    });
    if (hasData) rows.push(row);
  }
  return { headers, rows, groupRow };
}

// ── AVAILABILITY ICONS ─────────────────────────────────────
const ICON_PUBLIC = `
  <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:block">
    <circle cx="8" cy="8" r="6.5" stroke="#22c55e" stroke-width="1.4" fill="#dcfce7"/>
    <ellipse cx="8" cy="8" rx="2.8" ry="6.5" stroke="#22c55e" stroke-width="1.1" fill="none"/>
    <line x1="1.5" y1="8" x2="14.5" y2="8" stroke="#22c55e" stroke-width="1.1"/>
    <line x1="2.3" y1="5.2" x2="13.7" y2="5.2" stroke="#22c55e" stroke-width="0.9"/>
    <line x1="2.3" y1="10.8" x2="13.7" y2="10.8" stroke="#22c55e" stroke-width="0.9"/>
  </svg>`;

const ICON_UPON_REQUEST = `
  <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:block">
    <rect x="2.5" y="7.5" width="11" height="7" rx="1.5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4"/>
    <path d="M5 7.5V5.5a3 3 0 016 0v2" stroke="#f59e0b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="8" cy="11" r="1" fill="#f59e0b"/>
  </svg>`;

function accessIcon(value) {
  const v = (value || '').toString().trim().toLowerCase();
  if (v === 'public')                           return { svg: ICON_PUBLIC,       title: 'Publicly available' };
  if (v === 'upon request' || v === 'on request') return { svg: ICON_UPON_REQUEST, title: 'Available upon request' };
  return null;
}

// ── POPULATION POPOVER ─────────────────────────────────────
function openPopover(triggerEl, datasetName, populationText) {
  const body = document.getElementById('pop-box-body');
  const box  = document.getElementById('pop-box');
  body.textContent = populationText || '—';

  // Position near the trigger element
  const rect = triggerEl.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  box.style.top = ''; box.style.bottom = '';
  box.style.left = ''; box.style.right = '';

  // Prefer showing below; flip up if near bottom
  const spaceBelow = vh - rect.bottom;
  if (spaceBelow >= 120) {
    box.style.top = (rect.bottom + 6) + 'px';
  } else {
    box.style.bottom = (vh - rect.top + 6) + 'px';
  }
  // Align left edge with trigger; clamp so it doesn't overflow right
  const left = Math.min(rect.left, vw - 340);
  box.style.left = Math.max(8, left) + 'px';

  document.getElementById('pop-overlay').classList.add('open');
}

function closePopover() {
  document.getElementById('pop-overlay').classList.remove('open');
}

// ── DATASET CELL RENDERER (name + access icon) ─────────────
function datasetCellRenderer(params) {
  const name = params.value ?? '';
  const icon = accessColName ? accessIcon(params.data[accessColName]) : null;
  const popText = populationColName ? (params.data[populationColName] || '') : '';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;gap:6px;height:100%;';

  const label = document.createElement('span');
  if (popText) {
    label.className   = 'dataset-link';
    label.textContent = name;
    label.title       = 'Click to view population';
    label.onclick     = e => { e.stopPropagation(); openPopover(label, name, popText); };
  } else {
    label.textContent = name;
  }
  wrap.appendChild(label);

  if (icon) {
    const tip = document.createElement('span');
    tip.title = icon.title;
    tip.style.cssText = 'display:flex;align-items:center;flex-shrink:0;';
    tip.innerHTML = icon.svg;
    wrap.appendChild(tip);
  }

  return wrap;
}

// ── DATA PROCESSING ────────────────────────────────────────
function loadData(csvText) {
  const { headers, rows, groupRow } = parseCSV(csvText);

  // Detect the access/availability column (values: "public" / "upon request")
  accessColName = headers.find(h => /^access$|^availability$/i.test(h.trim())) || null;
  // Also try heuristic: any column where most non-empty values match the known strings
  if (!accessColName) {
    accessColName = headers.find(h => {
      const vals = rows.map(r => (r[h] || '').trim().toLowerCase()).filter(Boolean);
      return vals.length > 0 && vals.every(v => v === 'public' || v === 'upon request' || v === 'on request');
    }) || null;
  }

  // Detect the population column
  populationColName = headers.find(h => /^population$/i.test(h.trim())) || null;

  currentHeaders = headers.filter(h => h !== 'level' && h !== accessColName && h !== populationColName);

  hierarchyMap.clear();
  let lastParentName = null;

  rows.forEach(row => {
    const level = parseInt(row['level'] || '1');
    const name  = row['Dataset'];
    if (level === 1) {
      if (!name) return;
      lastParentName = name;
      hierarchyMap.set(name, { master: row, children: [] });
    } else {
      if (lastParentName && hierarchyMap.has(lastParentName)) {
        row._isChild    = true;
        row._parentName = lastParentName;
        hierarchyMap.get(lastParentName).children.push(row);
      }
    }
  });

  const initialRows = Array.from(hierarchyMap.values()).map(h => h.master).filter(Boolean);
  columnDefs = buildColDefs(currentHeaders, groupRow, headers);

  document.getElementById('empty-state').style.display    = 'none';
  document.getElementById('myGrid').style.display         = '';
  document.getElementById('toolbar').style.display        = '';
  document.getElementById('export-btn').style.display     = '';
  document.getElementById('row-mgr-btn').style.display    = '';
  document.getElementById('col-mgr-btn').style.display    = '';

  initGrid(currentHeaders, initialRows);
}

function buildColDefs(headers, groupRow, allHeaders) {
  const expandColDef = {
    headerName: '', field: '_expand',
    width: 44, minWidth: 44, maxWidth: 44,
    sortable: false, filter: false, resizable: false,
    cellRenderer: params => {
      if (params.data._isChild) return '';
      const entry = hierarchyMap.get(params.data['Dataset']);
      if (!entry || entry.children.length === 0) return '';
      const isExpanded = expandedDatasets.has(params.data['Dataset']);
      const btn = document.createElement('div');
      btn.className = 'expand-icon';
      btn.title     = isExpanded ? 'Collapse' : `Expand (${entry.children.length} subgroups)`;
      btn.innerHTML = isExpanded ? '▾' : '▸';
      btn.onclick   = () => toggleExpansion(params.data['Dataset']);
      return btn;
    }
  };

  // Helper: build a single leaf column def
  const leafDef = h => {
    const isDataset = h === 'Dataset';
    return {
      field: h, headerName: h,
      sortable: true, filter: true, resizable: true,
      minWidth: isDataset ? 180 : 80,
      ...(isDataset ? { pinned: 'left' } : {}),
      cellClass: params => params.data._isChild ? 'child-row-cell' : '',
      cellRenderer: isDataset ? datasetCellRenderer : undefined,
    };
  };

  // No group row → flat column list (original behaviour)
  if (!groupRow) {
    return [expandColDef, ...headers.map(leafDef), actionsColDef()];
  }

  // Two-row header: build column groups
  // groupRow aligns with allHeaders (full, including 'level')
  // Expand category names forward across empty cells
  let currentCat = '';
  const colCatMap = new Map(); // fieldName → categoryName
  allHeaders.forEach((h, idx) => {
    const cell = (groupRow[idx] || '').trim();
    if (cell) currentCat = cell;
    colCatMap.set(h, currentCat);
  });

  const groupMap   = new Map(); // catName → [colDef]
  const groupOrder = [];
  const standalone = []; // columns with no category (before first group)

  headers.forEach(h => {
    const cat = colCatMap.get(h) || '';
    const def = leafDef(h);
    if (!cat || h === 'Dataset') {
      standalone.push(def);
    } else {
      if (!groupMap.has(cat)) {
        groupMap.set(cat, []);
        groupOrder.push(cat);
      }
      groupMap.get(cat).push(def);
    }
  });

  const groupedDefs = groupOrder.map(cat => ({
    headerName: cat,
    marryChildren: true,
    children: groupMap.get(cat),
  }));

  return [expandColDef, ...standalone, ...groupedDefs, actionsColDef()];
}

function toggleExpansion(parentName) {
  const entry = hierarchyMap.get(parentName);
  if (!entry) return;
  if (expandedDatasets.has(parentName)) {
    gridApi.applyTransaction({ remove: entry.children });
    expandedDatasets.delete(parentName);
  } else {
    let insertIndex = null;
    gridApi.forEachNode((node, idx) => {
      if (node.data && node.data['Dataset'] === parentName) insertIndex = idx + 1;
    });
    gridApi.applyTransaction({
      add: entry.children,
      addIndex: insertIndex !== null ? insertIndex : undefined
    });
    expandedDatasets.add(parentName);
  }
  gridApi.refreshCells({ columns: ['_expand'], force: true });
  updateStats();
}

function actionsColDef() {
  return {
    headerName: '', field: '_actions',
    width: 44, minWidth: 44, maxWidth: 44,
    sortable: false, filter: false, resizable: false,
    cellRenderer: params => {
      const btn       = document.createElement('button');
      btn.innerHTML   = '✕';
      btn.title       = 'Remove row';
      btn.style.cssText = 'background:none;border:none;cursor:pointer;color:#d1d5db;font-size:12px;padding:0;line-height:1;';
      btn.onmouseenter = () => btn.style.color = '#ef4444';
      btn.onmouseleave = () => btn.style.color = '#d1d5db';
      btn.onclick = () => {
        removedRows.push({ ...params.data });
        gridApi.applyTransaction({ remove: [params.data] });
        showToast('Row removed');
        updateStats();
      };
      return btn;
    }
  };
}

// ── AUTO-SIZE HELPERS ─────────────────────────────────────
// After autoSizeAllColumns, group-header widths depend on the sum of their
// children.  This function measures each group's label text and, if the
// children are collectively too narrow, distributes the extra width evenly.
function ensureGroupHeadersFit(api, topLevelDefs) {
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  // Match ag-Grid Quartz header font (semi-bold, ~13 px)
  ctx.font = '600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';

  function leafFields(def) {
    if (!def.children) return def.field ? [def.field] : [];
    return def.children.flatMap(leafFields);
  }

  topLevelDefs.forEach(def => {
    if (!def.children || !def.headerName) return;
    const needed = ctx.measureText(def.headerName).width + 28; // 28px for cell padding
    const leaves = leafFields(def);
    const current = leaves.reduce((sum, f) => {
      const col = api.getColumn(f);
      return sum + (col ? col.getActualWidth() : 0);
    }, 0);
    if (needed > current) {
      const extra = Math.ceil((needed - current) / leaves.length);
      leaves.forEach(f => {
        const col = api.getColumn(f);
        if (col) api.setColumnWidths([{ key: f, newWidth: col.getActualWidth() + extra }]);
      });
    }
  });
}

// ── GRID INIT ────────────────────────────────────────────
function initGrid(headers, rows) {
  agGrid.createGrid(document.getElementById('myGrid'), {
    columnDefs,
    rowData: rows,
    defaultColDef: { minWidth: 80 },
    animateRows: true,
    pagination: true,
    paginationPageSize: 50,
    getRowId: p => String(p.data._rowId),
    getRowClass: params => params.data._isChild ? 'child-row' : '',
    onGridReady: params => {
      gridApi = params.api;
      gridApi.autoSizeAllColumns(false);
      ensureGroupHeadersFit(gridApi, columnDefs);
      renderChips(headers);
      updateStats();
    },
    onFilterChanged:    updateStats,
    onPaginationChanged: updateStats,
  });
}

function renderChips(headers) {
  const wrap = document.getElementById('col-chips');
  wrap.innerHTML = headers.map(h => `
    <div class="col-chip on" id="chip-${CSS.escape(h)}"
         onclick="toggleColumn('${h.replace(/'/g, "\\'")}')">
      ${h}
    </div>`).join('');
}

function toggleColumn(field) {
  const col = gridApi.getColumn(field);
  if (!col) return;
  const nowVisible = !col.isVisible();
  gridApi.setColumnsVisible([field], nowVisible);
  const chip = document.getElementById(`chip-${CSS.escape(field)}`);
  if (chip) chip.classList.toggle('on', nowVisible);
}

function updateStats() {
  if (!gridApi) return;
  const count = gridApi.getDisplayedRowCount();
  document.getElementById('stats-label').innerHTML = `<strong>${count}</strong> rows visible`;
}

function parseModalitiesCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');

  // Row 0: category group names (empty cells = same group as previous)
  // Row 1: sub-column names (first cell = "Dataset")
  // Row 2+: data
  const catRow = splitLine(lines[0], ',');
  const subRow = splitLine(lines[1], ',');

  // Expand category names across empty cells
  let currentCat = '';
  const colCategories = catRow.map(cell => {
    if (cell.trim()) currentCat = cell.trim();
    return currentCat;
  });

  const dataRows = [];
  for (let i = 2; i < lines.length; i++) {
    const vals = splitLine(lines[i], ',');
    const rowName = vals[0];
    if (!rowName) continue;
    const row = { _rowId: ++rowIdCounter };
    subRow.forEach((h, idx) => {
      if (!h) return;
      row[h] = vals[idx] !== undefined ? vals[idx].trim() : '';
    });
    dataRows.push(row);
  }

  return { catRow, subRow, colCategories, dataRows };
}

function buildModalityColDefs(subRow, colCategories) {
  // Build groups: category → [column fields]
  const groupMap   = new Map(); // catName → [colDef]
  const groupOrder = [];

  subRow.forEach((colName, idx) => {
    if (idx === 0) return; // skip "Dataset" index — handled as pinned col
    if (!colName) return;
    const cat = colCategories[idx] || 'Other';

    if (!groupMap.has(cat)) {
      groupMap.set(cat, []);
      groupOrder.push(cat);
    }

    groupMap.get(cat).push({
      field: colName,
      headerName: colName,
      width: 80,
      minWidth: 60,
      maxWidth: 120,
      sortable: true,
      filter: false,
      resizable: true,
      cellRenderer: modalityCellRenderer,
      headerTooltip: colName,
    });
  });

  const pinnedDataset = {
    field: 'Dataset',
    headerName: 'Dataset',
    pinned: 'left',
    width: 130,
    minWidth: 100,
    sortable: true,
    filter: true,
    resizable: true,
    cellStyle: { fontWeight: '600', color: '#1a1a2e' },
  };

  const groupColDefs = groupOrder.map(cat => ({
    headerName: cat,
    marryChildren: true,
    children: groupMap.get(cat),
  }));

  return [pinnedDataset, ...groupColDefs];
}

function modalityCellRenderer(params) {
  const raw = (params.value || '').toString().trim();
  if (!raw) {
    // Empty — show subtle dash
    const span = document.createElement('span');
    span.style.cssText = 'color:#d1d5db;font-size:10px;';
    span.textContent = '–';
    return span;
  }

  const isOptional = raw.startsWith('(') && raw.endsWith(')');
  const chip = document.createElement('div');
  chip.className = `mod-cell-val ${isOptional ? 'optional' : 'present'}`;
  chip.textContent = raw;
  chip.title = isOptional
    ? `${raw} – optional / conditional`
    : `${raw} channel${raw !== '1' ? 's' : ''}`;
  return chip;
}

function loadModalitiesData(csvText) {
  const { subRow, colCategories, dataRows } = parseModalitiesCSV(csvText);
  const colDefs = buildModalityColDefs(subRow, colCategories);

  document.getElementById('mod-empty-state').style.display = 'none';
  document.getElementById('modalitiesGrid').style.display  = '';

  agGrid.createGrid(document.getElementById('modalitiesGrid'), {
    columnDefs: colDefs,
    rowData: dataRows,
    defaultColDef: { minWidth: 40 },
    animateRows: true,
    pagination: true,
    paginationPageSize: 50,
    getRowId: p => String(p.data._rowId),
    onGridReady: params => {
      modGridApi = params.api;
      modGridApi.autoSizeAllColumns(false);
      ensureGroupHeadersFit(modGridApi, colDefs);
      updateModStats();
    },
    onFilterChanged:    updateModStats,
    onPaginationChanged: updateModStats,
  });
}

function updateModStats() {
  if (!modGridApi) return;
  const count = modGridApi.getDisplayedRowCount();
  document.getElementById('mod-stats-label').innerHTML = `<strong>${count}</strong> datasets`;
}

// ── SHARED UTILS ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── MODALS ────────────────────────────────────────────────
function openColManager() {
  const list = document.getElementById('col-manager-list');
  const cols  = gridApi.getColumns().filter(c => !['_actions','_expand'].includes(c.getColId()));
  list.innerHTML = cols.map(col => {
    const id = col.getColId();
    const visible = col.isVisible();
    return `<label style="display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.4rem;font-size:0.8rem;cursor:pointer;border-radius:4px;"
              onmouseenter="this.style.background='#f4f5f7'" onmouseleave="this.style.background=''">
      <input type="checkbox" ${visible ? 'checked' : ''}
             onchange="gridApi.setColumnsVisible(['${id}'], this.checked);
                       document.getElementById('chip-${CSS.escape(id)}')?.classList.toggle('on', this.checked)"> ${id}
    </label>`;
  }).join('');
  document.getElementById('col-overlay').classList.add('open');
}

function showAllColumns() {
  const cols = gridApi.getAllColumns()
    .filter(c => !['_actions','_expand'].includes(c.getColId()))
    .map(c => c.getColId());
  gridApi.setColumnsVisible(cols, true);
  cols.forEach(id => {
    const chip = document.getElementById(`chip-${CSS.escape(id)}`);
    if (chip) chip.classList.add('on');
  });
}

function openRowManager() {
  renderRowManagerList();
  document.getElementById('row-overlay').classList.add('open');
}

function renderRowManagerList() {
  const list = document.getElementById('row-manager-list');
  if (removedRows.length === 0) {
    list.innerHTML = '<span style="font-size:0.8rem;color:#9ca3af;">No removed rows yet.</span>';
    return;
  }
  list.innerHTML = removedRows.map((r, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem;border-bottom:1px solid #f0f0f0;font-size:0.8rem;">
      <span>${r.Dataset || '(unnamed)'}</span>
      <button class="nav-btn" style="padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="restoreRow(${i})">Restore</button>
    </div>`).join('');
}

function restoreRow(i) {
  gridApi.applyTransaction({ add: [removedRows[i]] });
  removedRows.splice(i, 1);
  renderRowManagerList();
  updateStats();
}

function restoreAllRows() {
  gridApi.applyTransaction({ add: [...removedRows] });
  removedRows = [];
  renderRowManagerList();
  updateStats();
}

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  ['col-overlay','row-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) e.target.classList.remove('open');
    });
  });
  autoLoadCSV();
});
