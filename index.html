<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PillowCase</title>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-logo .dot { width: 8px; height: 8px; background: #0066ff; border-radius: 50%; }
    .nav-brand { display: flex; flex-direction: column; gap: 0.05rem; }
    .nav-subtitle { font-size: 0.68rem; color: #9ca3af; font-weight: 400; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e4e9;
      background: #fff;
      color: #444;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #f4f5f7; border-color: #ccc; }
    .nav-btn.primary { background: #0066ff; color: #fff; border-color: #0066ff; }
    .nav-btn.primary:hover { background: #0052d4; }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center; gap: 0.4rem;
      border: 1px solid #e2e4e9;
      border-radius: 6px;
      padding: 0.38rem 0.7rem;
      background: #f9fafb;
      flex: 0 0 240px;
    }
    .search-box svg { color: #9ca3af; flex-shrink: 0; }
    .search-box input { border: none; background: transparent; outline: none; font-size: 0.82rem; color: #1a1a2e; width: 100%; }
    .tool-sep { width: 1px; height: 20px; background: #e2e4e9; }
    .col-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .col-chip {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.28rem 0.65rem;
      border-radius: 20px;
      border: 1px solid #e2e4e9;
      font-size: 0.74rem;
      cursor: pointer;
      background: #f9fafb;
      color: #555;
      transition: all 0.12s;
    }
    .col-chip.on { background: #e8f0ff; border-color: #0066ff55; color: #0052d4; font-weight: 500; }
    .stats-label { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }
    .stats-label strong { color: #1a1a2e; }

    .grid-wrap {
      flex: 1;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow: hidden;
    }
    #myGrid {
      flex: 1;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px #e2e4e9;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #9ca3af;
      border-radius: 10px;
      border: 2px dashed #e2e4e9;
      background: #fff;
    }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 2rem; width: 500px; max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal p { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.2rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.2rem; }

    .toast {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      background: #1a1a2e; color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 8px;
      font-size: 0.8rem; z-index: 999;
      opacity: 0; transform: translateY(6px);
      transition: all 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .ag-theme-quartz {
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --ag-font-size: 13px;
      --ag-header-background-color: #f8f9fb;
      --ag-odd-row-background-color: #fff;
      --ag-row-hover-color: #f0f6ff;
      --ag-selected-row-background-color: #e8f0ff;
      --ag-border-color: #e2e4e9;
      --ag-header-column-separator-color: #e2e4e9;
      --ag-cell-horizontal-padding: 14px;
      --ag-row-height: 40px;
      --ag-header-height: 42px;
    }

    .expand-icon {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 14px;
      color: #9ca3af;
      transition: color 0.15s;
      user-select: none;
    }
    .expand-icon:hover { color: #0066ff; }

    /* Style child rows differently */
    .child-row-cell {
      color: #6b7280;
      font-style: italic;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="dot"></div>
    <div class="nav-brand">
      <span>PillowCase</span>
      <span class="nav-subtitle">A catalogue of sleep datasets</span>
    </div>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" id="export-btn" onclick="exportCSV()" style="display:none">Export</button>
  <button class="nav-btn" id="row-mgr-btn" onclick="openRowManager()" style="display:none">Manage Rows</button>
  <button class="nav-btn" id="col-mgr-btn" onclick="openColManager()" style="display:none">Manage Columns</button>
</nav>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Quick filter..." oninput="gridApi.setGridOption('quickFilterText', this.value)"/>
  </div>
  <div class="tool-sep"></div>
  <div class="col-chips" id="col-chips"></div>
  <div class="tool-sep"></div>
  <div class="stats-label" id="stats-label">Loading…</div>
</div>

<div class="grid-wrap">
  <div class="empty-state" id="empty-state">
    <p>Loading Datasets_Catalogue.csv…</p>
  </div>
  <div id="myGrid" class="ag-theme-quartz" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="col-overlay">
  <div class="modal">
    <h2>Manage Columns</h2>
    <p>Toggle column visibility.</p>
    <div id="col-manager-list" style="display:flex;flex-direction:column;gap:0.4rem;max-height:340px;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="nav-btn" onclick="document.getElementById('col-overlay').classList.remove('open')">Close</button>
      <button class="nav-btn primary" onclick="showAllColumns()">Show All</button>
    </div>
  </div>
</div>

<div class="overlay" id="row-overlay">
  <div class="modal">
    <h2>Manage Rows</h2>
    <p>Restore removed rows.</p>
    <div id="row-manager-list" style="display:flex;flex-direction:column;gap:0.4rem;max-height:340px;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="nav-btn" onclick="document.getElementById('row-overlay').classList.remove('open')">Close</button>
      <button class="nav-btn primary" onclick="restoreAllRows()">Restore All</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────
let gridApi;
let columnDefs = [];
let rowIdCounter = 1000;
let currentHeaders = [];
let removedRows = [];
let hierarchyMap = new Map(); // key: parentDatasetName -> { master, children[] }
let expandedDatasets = new Set();

// ── CSV PARSER ────────────────────────────────────────────
function detectDelimiter(text) {
  const firstLine = text.split(/\r?\n/)[0];
  const semicolons = (firstLine.match(/;/g) || []).length;
  const commas = (firstLine.match(/,/g) || []).length;
  return semicolons >= commas ? ';' : ',';
}

function splitLine(line, delim) {
  const fields = [];
  let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === delim) { fields.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
  }
  fields.push(cur.trim());
  return fields;
}

function parseCSV(text) {
  const delim = detectDelimiter(text);
  const rawLines = [];
  let buf = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') inQ = !inQ;
    if (!inQ && (ch === '\n' || (ch === '\r' && text[i+1] === '\n'))) {
      if (ch === '\r') i++;
      if (buf.trim()) rawLines.push(buf);
      buf = '';
    } else buf += ch;
  }
  if (buf.trim()) rawLines.push(buf);

  const headers = splitLine(rawLines[0], delim);
  const rows = [];
  for (let i = 1; i < rawLines.length; i++) {
    const vals = splitLine(rawLines[i], delim);
    const row = { _rowId: ++rowIdCounter };
    let hasData = false;
    headers.forEach((h, idx) => {
      const val = vals[idx] !== undefined ? vals[idx] : '';
      row[h] = val;
      if (val !== '') hasData = true;
    });
    if (hasData) rows.push(row);
  }
  return { headers, rows };
}

// ── DATA PROCESSING ────────────────────────────────────────
function loadData(csvText) {
  const { headers, rows } = parseCSV(csvText);

  // Exclude internal columns from display
  currentHeaders = headers.filter(h => h !== 'level');

  // ── FIX: Build hierarchy by tracking the last-seen level-1 parent ──
  hierarchyMap.clear();
  let lastParentName = null;

  rows.forEach(row => {
    const level = parseInt(row['level'] || '1');
    const name = row['Dataset'];

    if (level === 1) {
      // This is a master/parent row
      if (!name) return; // skip rows with no dataset name
      lastParentName = name;
      hierarchyMap.set(name, { master: row, children: [] });
    } else {
      // This is a child row — attach to the last-seen parent
      if (lastParentName && hierarchyMap.has(lastParentName)) {
        // Tag child rows so we can style them
        row._isChild = true;
        row._parentName = lastParentName;
        hierarchyMap.get(lastParentName).children.push(row);
      }
    }
  });

  // Initial display: only level-1 master rows
  const initialRows = Array.from(hierarchyMap.values())
    .map(h => h.master)
    .filter(Boolean);

  columnDefs = buildColDefs(currentHeaders);

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('myGrid').style.display = '';
  document.getElementById('toolbar').style.display = '';
  document.getElementById('export-btn').style.display = '';
  document.getElementById('row-mgr-btn').style.display = '';
  document.getElementById('col-mgr-btn').style.display = '';

  initGrid(currentHeaders, initialRows);
}

function buildColDefs(headers) {
  const expandColDef = {
    headerName: '',
    field: '_expand',
    width: 44,
    minWidth: 44,
    maxWidth: 44,
    sortable: false,
    filter: false,
    resizable: false,
    cellRenderer: params => {
      if (params.data._isChild) return ''; // no expand arrow on children

      const entry = hierarchyMap.get(params.data['Dataset']);
      if (!entry || entry.children.length === 0) return ''; // no children

      const isExpanded = expandedDatasets.has(params.data['Dataset']);
      const btn = document.createElement('div');
      btn.className = 'expand-icon';
      btn.title = isExpanded ? 'Collapse' : `Expand (${entry.children.length} subgroups)`;
      btn.innerHTML = isExpanded ? '▾' : '▸';
      btn.onclick = () => toggleExpansion(params.data['Dataset']);
      return btn;
    }
  };

  const dataCols = headers.map(h => {
    const isDataset = h === 'Dataset';
    return {
      field: h,
      headerName: h,
      sortable: true,
      filter: true,
      resizable: true,
      minWidth: isDataset ? 160 : 100,
      ...(isDataset ? { pinned: 'left' } : {}),
      cellClass: params => params.data._isChild ? 'child-row-cell' : '',
    };
  });

  return [expandColDef, ...dataCols, actionsColDef()];
}

function toggleExpansion(parentName) {
  const entry = hierarchyMap.get(parentName);
  if (!entry) return;

  if (expandedDatasets.has(parentName)) {
    // Collapse: remove all children
    gridApi.applyTransaction({ remove: entry.children });
    expandedDatasets.delete(parentName);
  } else {
    // Expand: insert children right after the parent row
    // Find the index of the parent to insert after it
    let insertIndex = null;
    gridApi.forEachNode((node, idx) => {
      if (node.data && node.data['Dataset'] === parentName) {
        insertIndex = idx + 1;
      }
    });
    gridApi.applyTransaction({
      add: entry.children,
      addIndex: insertIndex !== null ? insertIndex : undefined
    });
    expandedDatasets.add(parentName);
  }

  // Refresh expand column to flip arrow
  gridApi.refreshCells({ columns: ['_expand'], force: true });
  updateStats();
}

function actionsColDef() {
  return {
    headerName: '',
    field: '_actions',
    width: 44,
    minWidth: 44,
    maxWidth: 44,
    sortable: false,
    filter: false,
    resizable: false,
    cellRenderer: params => {
      const btn = document.createElement('button');
      btn.innerHTML = '✕';
      btn.title = 'Remove row';
      btn.style.cssText = 'background:none;border:none;cursor:pointer;color:#d1d5db;font-size:12px;padding:0;line-height:1;';
      btn.onmouseenter = () => btn.style.color = '#ef4444';
      btn.onmouseleave = () => btn.style.color = '#d1d5db';
      btn.onclick = () => {
        removedRows.push({ ...params.data });
        gridApi.applyTransaction({ remove: [params.data] });
        showToast('Row removed');
        updateStats();
      };
      return btn;
    }
  };
}

// ── GRID INIT ────────────────────────────────────────────
function initGrid(headers, rows) {
  const options = {
    columnDefs,
    rowData: rows,
    defaultColDef: { flex: 1, minWidth: 100 },
    animateRows: true,
    pagination: true,
    paginationPageSize: 25,
    getRowId: p => String(p.data._rowId),
    getRowClass: params => params.data._isChild ? 'child-row' : '',
    onGridReady: params => {
      gridApi = params.api;
      renderChips(headers);
      updateStats();
    },
    onFilterChanged: updateStats,
    onPaginationChanged: updateStats,
  };
  agGrid.createGrid(document.getElementById('myGrid'), options);
}

function renderChips(headers) {
  const wrap = document.getElementById('col-chips');
  wrap.innerHTML = headers.map(h => `
    <div class="col-chip on" id="chip-${CSS.escape(h)}" onclick="toggleColumn('${h.replace(/'/g, "\\'")}')">
      ${h}
    </div>`).join('');
}

function toggleColumn(field) {
  const col = gridApi.getColumn(field);
  if (!col) return;
  const nowVisible = !col.isVisible();
  gridApi.setColumnsVisible([field], nowVisible);
  const chip = document.getElementById(`chip-${CSS.escape(field)}`);
  if (chip) chip.classList.toggle('on', nowVisible);
}

function updateStats() {
  if (!gridApi) return;
  const count = gridApi.getDisplayedRowCount();
  document.getElementById('stats-label').innerHTML = `<strong>${count}</strong> rows visible`;
}

// ── CSV LOAD ─────────────────────────────────────────────
async function autoLoadCSV() {
  const FALLBACK = `Dataset,level,year,subjects,recordings\r\nABC,1,2011,49,132\r\nABC_sub,2,2011,sub-group A,66\r\nABC_sub2,2,2011,sub-group B,66\r\nANPHY,1,2024,29,29\r\nAPOE,1,2003,712,712\r\nAPOE_A,2,2003,Age 18-40,356\r\nAPOE_B,2,2003,Age 41-90,356\r\n`;
  try {
    const resp = await fetch('Datasets_Catalogue.csv');
    if (!resp.ok) throw new Error('not found');
    loadData(await resp.text());
  } catch {
    loadData(FALLBACK);
  }
}

function exportCSV() {
  gridApi.exportDataAsCsv({ fileName: 'pillowcase_export.csv' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── MODALS ────────────────────────────────────────────────
function openColManager() {
  const list = document.getElementById('col-manager-list');
  const cols = gridApi.getColumns().filter(c => !['_actions','_expand'].includes(c.getColId()));
  list.innerHTML = cols.map(col => {
    const id = col.getColId();
    const visible = col.isVisible();
    return `<label style="display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.4rem;font-size:0.8rem;cursor:pointer;border-radius:4px;" onmouseenter="this.style.background='#f4f5f7'" onmouseleave="this.style.background=''">
      <input type="checkbox" ${visible ? 'checked' : ''} onchange="gridApi.setColumnsVisible(['${id}'], this.checked); document.getElementById('chip-${CSS.escape(id)}')?.classList.toggle('on', this.checked)"> ${id}
    </label>`;
  }).join('');
  document.getElementById('col-overlay').classList.add('open');
}

function showAllColumns() {
  const cols = gridApi.getAllColumns()
    .filter(c => !['_actions','_expand'].includes(c.getColId()))
    .map(c => c.getColId());
  gridApi.setColumnsVisible(cols, true);
  cols.forEach(id => {
    const chip = document.getElementById(`chip-${CSS.escape(id)}`);
    if (chip) chip.classList.add('on');
  });
}

function openRowManager() {
  renderRowManagerList();
  document.getElementById('row-overlay').classList.add('open');
}

function renderRowManagerList() {
  const list = document.getElementById('row-manager-list');
  if (removedRows.length === 0) {
    list.innerHTML = '<span style="font-size:0.8rem;color:#9ca3af;">No removed rows yet.</span>';
    return;
  }
  list.innerHTML = removedRows.map((r, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem;border-bottom:1px solid #f0f0f0;font-size:0.8rem;">
      <span>${r.Dataset || '(unnamed)'}</span>
      <button class="nav-btn" style="padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="restoreRow(${i})">Restore</button>
    </div>`).join('');
}

function restoreRow(i) {
  gridApi.applyTransaction({ add: [removedRows[i]] });
  removedRows.splice(i, 1);
  renderRowManagerList();
  updateStats();
}

function restoreAllRows() {
  gridApi.applyTransaction({ add: [...removedRows] });
  removedRows = [];
  renderRowManagerList();
  updateStats();
}

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  ['col-overlay','row-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) e.target.classList.remove('open');
    });
  });
  autoLoadCSV();
});
</script>
</body>
</html>
