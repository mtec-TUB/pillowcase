<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PillowCase</title>

  <!-- AG Grid Community -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP NAV */
    nav {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-logo .dot { width: 8px; height: 8px; background: #0066ff; border-radius: 50%; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e4e9;
      background: #fff;
      color: #444;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: #f4f5f7; border-color: #ccc; }
    .nav-btn.primary { background: #0066ff; color: #fff; border-color: #0066ff; }
    .nav-btn.primary:hover { background: #0052d4; }
    .nav-btn svg { flex-shrink: 0; }

    /* TOOLBAR */
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center; gap: 0.4rem;
      border: 1px solid #e2e4e9;
      border-radius: 6px;
      padding: 0.38rem 0.7rem;
      background: #f9fafb;
      flex: 0 0 240px;
    }
    .search-box svg { color: #9ca3af; flex-shrink: 0; }
    .search-box input {
      border: none; background: transparent; outline: none;
      font-size: 0.82rem; color: #1a1a2e; width: 100%;
    }
    .search-box input::placeholder { color: #9ca3af; }

    .tool-sep { width: 1px; height: 20px; background: #e2e4e9; }

    .col-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .col-chip {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.28rem 0.65rem;
      border-radius: 20px;
      border: 1px solid #e2e4e9;
      font-size: 0.74rem;
      cursor: pointer;
      background: #f9fafb;
      color: #555;
      transition: all 0.12s;
      user-select: none;
    }
    .col-chip:hover { border-color: #0066ff33; background: #f0f6ff; }
    .col-chip.on { background: #e8f0ff; border-color: #0066ff55; color: #0052d4; font-weight: 500; }
    .col-chip .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .stats-label { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }
    .stats-label strong { color: #1a1a2e; }

    /* GRID */
    .grid-wrap {
      flex: 1;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow: hidden;
    }
    #myGrid {
      flex: 1;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px #e2e4e9;
    }

    /* ADD ROW PANEL */
    .add-panel {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      display: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .add-panel.open { display: block; }
    .add-panel h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.9rem; color: #555; }
    .add-form { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: flex-end; }
    .add-field { display: flex; flex-direction: column; gap: 0.25rem; }
    .add-field label { font-size: 0.68rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
    .add-field input, .add-field select {
      padding: 0.4rem 0.65rem;
      border: 1px solid #e2e4e9;
      border-radius: 6px;
      font-size: 0.8rem;
      outline: none;
      background: #f9fafb;
      color: #1a1a2e;
      width: 140px;
      transition: border 0.12s;
    }
    .add-field input:focus, .add-field select:focus { border-color: #0066ff; background: #fff; }

    /* IMPORT MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 2rem; width: 500px; max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal p { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.2rem; }
    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: 8px;
      padding: 1.8rem; text-align: center; cursor: pointer;
      transition: all 0.15s; background: #f9fafb;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #0066ff; background: #f0f6ff; }
    .drop-zone p { font-size: 0.8rem; color: #9ca3af; margin-top: 0.5rem; }
    textarea.csv-paste {
      width: 100%; height: 90px; margin-top: 0.8rem;
      border: 1px solid #e2e4e9; border-radius: 6px;
      padding: 0.5rem; font-size: 0.75rem;
      font-family: 'SFMono-Regular', Consolas, monospace;
      resize: vertical; outline: none; background: #f9fafb;
    }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.2rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      background: #1a1a2e; color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 8px;
      font-size: 0.8rem; z-index: 999;
      opacity: 0; transform: translateY(6px);
      transition: all 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* AG Grid overrides */
    .ag-theme-quartz {
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --ag-font-size: 13px;
      --ag-header-background-color: #f8f9fb;
      --ag-odd-row-background-color: #fff;
      --ag-row-hover-color: #f0f6ff;
      --ag-selected-row-background-color: #e8f0ff;
      --ag-border-color: #e2e4e9;
      --ag-header-column-separator-color: #e2e4e9;
      --ag-cell-horizontal-padding: 14px;
      --ag-row-height: 40px;
      --ag-header-height: 42px;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><div class="dot"></div> PillowCase</div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="document.getElementById('add-panel').classList.toggle('open')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Row
  </button>
  <button class="nav-btn" onclick="openImport()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Import CSV
  </button>
  <button class="nav-btn" onclick="exportCSV()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 16 12 21 17 16"/><line x1="12" y1="21" x2="12" y2="9"/></svg>
    Export CSV
  </button>
  <button class="nav-btn primary" onclick="openColManager()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Manage Columns
  </button>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Quick filter all columns…" oninput="gridApi.setGridOption('quickFilterText', this.value)"/>
  </div>
  <div class="tool-sep"></div>
  <div class="col-chips" id="col-chips"></div>
  <div class="tool-sep"></div>
  <div class="stats-label" id="stats-label">Loading…</div>
</div>

<!-- GRID AREA -->
<div class="grid-wrap">
  <!-- ADD ROW PANEL -->
  <div class="add-panel" id="add-panel">
    <h3>New row</h3>
    <div class="add-form" id="add-form"></div>
  </div>

  <div id="myGrid" class="ag-theme-quartz"></div>
</div>

<div class="toast" id="toast"></div>

<!-- COLUMN MANAGER MODAL -->
<div class="overlay" id="col-overlay">
  <div class="modal">
    <h2>Manage Columns</h2>
    <p>Check or uncheck columns to show or hide them in the grid.</p>
    <div id="col-manager-list" style="display:flex;flex-direction:column;gap:0.4rem;max-height:340px;overflow-y:auto;margin-top:0.5rem;"></div>
    <div class="modal-footer">
      <button class="nav-btn" onclick="document.getElementById('col-overlay').classList.remove('open')">Close</button>
      <button class="nav-btn primary" onclick="showAllColumns()">Show All</button>
    </div>
  </div>
</div>

<script>
// ── SAMPLE DATA ───────────────────────────────────────────
const SAMPLE_CSV = `ID,Product,Category,Revenue,Units Sold,Region,Status,Launch Date,Rating
1,Apex Pro X1,Electronics,142500,950,North America,Active,2023-03-12,4.7
2,BrewMaster 3000,Kitchen,67800,1420,Europe,Active,2022-11-05,4.5
3,CloudDesk v2,Software,320000,850,Global,Active,2024-01-20,4.9
4,DriftBoard 9,Sports,48900,320,Asia Pacific,Discontinued,2021-06-30,3.8
5,EcoWrap Lite,Packaging,22300,5600,North America,Active,2023-08-14,4.2
6,FusionLens 400,Photography,198000,440,Europe,Active,2024-02-28,4.8
7,GreenTrace Pro,Software,88500,1100,Global,Beta,2024-04-10,4.3
8,HydroKlean X,Home,31200,2800,North America,Active,2022-07-22,4.0
9,InfraCore 7,Enterprise,512000,210,Global,Active,2023-10-01,4.6
10,JetPack Mini,Travel,76400,680,Asia Pacific,Active,2023-05-18,4.4
11,KinetiFlow 2,Fitness,29700,3300,Europe,Active,2022-12-09,4.1
12,LuminAura S,Lighting,54600,1650,North America,Discontinued,2021-03-25,3.5
13,MeshGuard Pro,Security,163000,720,Global,Active,2024-03-15,4.7
14,NovaScan 100,Healthcare,285000,390,North America,Beta,2024-05-01,4.5
15,OmniTrack GPS,Automotive,97200,810,Europe,Active,2023-09-27,4.3
16,PulseCharge X,Electronics,119000,1240,Asia Pacific,Active,2024-01-08,4.6
17,QuikPress 5,Kitchen,41300,2100,North America,Active,2022-08-30,3.9
18,RoboVac Elite,Home,228000,960,Global,Active,2023-07-14,4.8
19,SolarCell 12,Energy,374000,580,Europe,Active,2024-02-11,4.9
20,TerraSense XL,Agriculture,56700,430,Asia Pacific,Beta,2024-04-22,4.2
21,UltraGrip 3,Sports,18900,1820,North America,Active,2023-02-16,4.0
22,VaultKey Pro,Security,142000,1050,Global,Active,2023-11-30,4.5
23,WaveCast 4K,Media,89300,760,Europe,Active,2024-01-25,4.4
24,XeroCell Nano,Electronics,67100,1380,Asia Pacific,Active,2023-06-08,4.2
25,YieldMax AI,Software,431000,670,Global,Active,2024-03-28,4.8
26,ZenPad Ultra,Tablets,178000,920,North America,Active,2024-02-02,4.6`;

// ── STATE ─────────────────────────────────────────────────
let gridApi;
let columnDefs = [];
let rowIdCounter = 1000;

// ── CSV PARSER ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const vals = line.split(',');
    const row = { _rowId: ++rowIdCounter };
    headers.forEach((h, i) => row[h] = (vals[i] || '').trim());
    return row;
  });
  return { headers, rows };
}

function inferType(key, rows) {
  const nums = ['Revenue', 'Units Sold', 'Rating', 'ID', 'Price', 'Score', 'Count', 'Amount'];
  if (nums.some(n => key.toLowerCase().includes(n.toLowerCase()))) return 'number';
  const sample = rows.slice(0, 5).map(r => r[key]).filter(Boolean);
  if (sample.every(v => !isNaN(+v))) return 'number';
  return 'text';
}

// ── COLUMN BUILDERS ───────────────────────────────────────
const STATUS_STYLES = {
  Active: 'background:#dcfce7;color:#15803d;border:1px solid #bbf7d0',
  Discontinued: 'background:#fee2e2;color:#b91c1c;border:1px solid #fecaca',
  Beta: 'background:#fef9c3;color:#854d0e;border:1px solid #fde047',
  Legacy: 'background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb'
};

function buildColDefs(headers, rows) {
  return headers.map(h => {
    const type = inferType(h, rows);
    const base = {
      field: h,
      headerName: h,
      sortable: true,
      filter: true,
      resizable: true,
      minWidth: 100,
    };
    if (type === 'number') {
      Object.assign(base, {
        type: 'numericColumn',
        filter: 'agNumberColumnFilter',
        valueFormatter: p => {
          if (p.value == null || p.value === '') return '—';
          if (h === 'Revenue') return '$' + Number(p.value).toLocaleString();
          if (h === 'Rating') return '★ ' + p.value;
          return Number(p.value).toLocaleString();
        }
      });
    }
    if (h === 'Status') {
      base.cellRenderer = p => {
        if (!p.value) return '—';
        const s = STATUS_STYLES[p.value] || STATUS_STYLES.Legacy;
        return `<span style="${s};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">${p.value}</span>`;
      };
    }
    return base;
  });
}

// ── LOAD DATA ─────────────────────────────────────────────
function loadData(csvText) {
  const { headers, rows } = parseCSV(csvText);
  columnDefs = buildColDefs(headers, rows);

  if (gridApi) {
    gridApi.setGridOption('columnDefs', columnDefs);
    gridApi.setGridOption('rowData', rows);
    renderChips(headers);
    buildAddForm(headers, rows);
    updateStats();
    showToast(`Loaded ${rows.length} rows · ${headers.length} columns`);
  }
}

// ── CHIP TOGGLES ──────────────────────────────────────────
function renderChips(headers) {
  const cols = gridApi
    ? gridApi.getColumns().filter(c => c.getColId() !== '_actions')
    : [];
  const list = headers
    ? headers.map(h => ({ id: h, label: h, visible: true }))
    : cols.map(c => ({ id: c.getColId(), label: c.getColDef().headerName || c.getColId(), visible: c.isVisible() }));

  const wrap = document.getElementById('col-chips');
  wrap.innerHTML = list.map(c => `
    <div class="col-chip ${c.visible ? 'on' : ''}" id="chip-${CSS.escape(c.id)}" onclick="toggleColumn('${c.id}')">
      <span class="chip-dot"></span>${c.label}
    </div>`).join('');
}

function toggleColumn(field) {
  const col = gridApi.getColumn(field);
  if (!col) return;
  const nowVisible = !col.isVisible();
  gridApi.setColumnsVisible([field], nowVisible);
  const chip = document.getElementById(`chip-${CSS.escape(field)}`);
  if (chip) chip.classList.toggle('on', nowVisible);
  updateStats();
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  if (!gridApi) return;
  const displayed = gridApi.getDisplayedRowCount();
  const total = gridApi.getGridOption('rowData')?.length || 0;
  const visibleCols = gridApi.getAllDisplayedColumns().length;
  const totalCols = columnDefs.length;
  document.getElementById('stats-label').innerHTML =
    `<strong>${displayed}</strong> of ${total} rows &nbsp;·&nbsp; <strong>${visibleCols}</strong> of ${totalCols} columns`;
}

// ── ADD ROW ───────────────────────────────────────────────
function buildAddForm(headers, rows) {
  const types = {};
  headers.forEach(h => types[h] = inferType(h, rows));
  document.getElementById('add-form').innerHTML = headers.map(h => `
    <div class="add-field">
      <label>${h}</label>
      <input id="nf-${h}" type="${types[h]==='number'?'number':'text'}" placeholder="${h}"/>
    </div>`).join('') + `
    <div class="add-field" style="justify-content:flex-end;padding-bottom:1px;">
      <button class="nav-btn primary" onclick="submitRow()">Add</button>
    </div>`;
}

function submitRow() {
  const cols = gridApi.getColumnDefs();
  const row = { _rowId: ++rowIdCounter };
  cols.forEach(c => {
    const el = document.getElementById(`nf-${c.field}`);
    if (el) row[c.field] = el.value;
  });
  gridApi.applyTransaction({ add: [row], addIndex: 0 });
  document.getElementById('add-panel').classList.remove('open');
  updateStats();
  showToast('Row added');
}

// ── IMPORT ────────────────────────────────────────────────
function openImport() { document.getElementById('import-overlay').classList.add('open'); }
function closeImport() { document.getElementById('import-overlay').classList.remove('open'); }

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => { loadData(ev.target.result); closeImport(); };
  r.readAsText(file);
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => { loadData(ev.target.result); closeImport(); };
  r.readAsText(file);
}
function importPaste() {
  const txt = document.getElementById('csv-paste').value.trim();
  if (txt) { loadData(txt); closeImport(); }
}

// ── EXPORT ────────────────────────────────────────────────
function exportCSV() {
  gridApi.exportDataAsCsv({ fileName: 'table-export.csv' });
  showToast('CSV exported');
}

// ── TOAST ─────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── COLUMN MANAGER ────────────────────────────────────────
function openColManager() {
  const list = document.getElementById('col-manager-list');
  const cols = gridApi.getColumns().filter(c => c.getColId() !== '_actions');
  list.innerHTML = cols.map(col => {
    const id = col.getColId();
    const visible = col.isVisible();
    return `<label style="display:flex;align-items:center;gap:0.65rem;padding:0.5rem 0.75rem;background:#f9fafb;border:1px solid #e2e4e9;border-radius:6px;cursor:pointer;">
      <input type="checkbox" ${visible ? 'checked' : ''} onchange="gridApi.setColumnsVisible(['${id}'], this.checked); renderChips(null); updateStats();" style="width:15px;height:15px;cursor:pointer;accent-color:#0066ff;"/>
      <span style="font-size:0.82rem;">${col.getColDef().headerName || id}</span>
    </label>`;
  }).join('');
  document.getElementById('col-overlay').classList.add('open');
}

function showAllColumns() {
  const cols = gridApi.getColumns().filter(c => c.getColId() !== '_actions').map(c => c.getColId());
  gridApi.setColumnsVisible(cols, true);
  renderChips(null);
  updateStats();
  openColManager();
}

// ── INIT AG GRID ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const { headers, rows } = parseCSV(SAMPLE_CSV);
  columnDefs = buildColDefs(headers, rows);

  const gridOptions = {
    columnDefs: [
      ...columnDefs,
      {
        headerName: '',
        field: '_actions',
        width: 52,
        minWidth: 52,
        maxWidth: 52,
        sortable: false,
        filter: false,
        resizable: false,
        suppressMovable: true,
        cellRenderer: p => {
          const btn = document.createElement('button');
          btn.innerHTML = '✕';
          btn.style.cssText = 'background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:2px 4px;border-radius:4px;transition:color .12s';
          btn.onmouseover = () => btn.style.color = '#ef4444';
          btn.onmouseleave = () => btn.style.color = '#d1d5db';
          btn.onclick = () => {
            gridApi.applyTransaction({ remove: [p.data] });
            updateStats();
            showToast('Row removed');
          };
          return btn;
        }
      }
    ],
    rowData: rows,
    defaultColDef: {
      flex: 1,
      minWidth: 100,
      resizable: true,
      sortable: true,
      filter: true,
    },
    animateRows: true,
    rowSelection: 'multiple',
    suppressRowClickSelection: true,
    pagination: true,
    paginationPageSize: 20,
    paginationPageSizeSelector: [10, 20, 50, 100],
    onGridReady: params => {
      gridApi = params.api;
      renderChips(headers);
      buildAddForm(headers, rows);
      updateStats();
    },
    onFilterChanged: updateStats,
    onColumnVisible: updateStats,
    getRowId: p => String(p.data._rowId || Math.random()),
  };

  agGrid.createGrid(document.getElementById('myGrid'), gridOptions);

  // close modals on backdrop click
  ['import-overlay', 'col-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) e.target.classList.remove('open');
    });
  });
});
</script>
</body>
</html>
