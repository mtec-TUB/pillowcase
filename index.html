
<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

    #myGrid {
      flex: 1;

    /* EMPTY STATE */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

    /* OVERLAY / MODALS */
    .overlay {

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal p { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.2rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.2rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      background: #1a1a2e; color: #fff;
      padding: 0.6rem 1.1rem; border-radius: 8px;

      opacity: 0; transform: translateY(6px);

    .toast.show { opacity: 1; transform: translateY(0); }

    /* AG Grid overrides */
    .ag-theme-quartz {
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --ag-font-size: 13px;
      --ag-header-background-color: #f8f9fb;
      --ag-odd-row-background-color: #fff;
      --ag-row-hover-color: #f0f6ff;
      --ag-selected-row-background-color: #e8f0ff;
      --ag-border-color: #e2e4e9;
      --ag-header-column-separator-color: #e2e4e9;
      --ag-cell-horizontal-padding: 14px;
      --ag-row-height: 40px;
      --ag-header-height: 42px;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <div class="dot"></div>
    <div class="nav-brand">
      <span>PillowCase</span>
      <span class="nav-subtitle">A catalogue of sleep datasets</span>
    </div>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" id="export-btn" onclick="exportCSV()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 16 12 21 17 16"/><line x1="12" y1="21" x2="12" y2="9"/></svg>
    Export
  </button>
  <button class="nav-btn" id="row-mgr-btn" onclick="openRowManager()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
    Manage Rows
  </button>
  <button class="nav-btn" id="col-mgr-btn" onclick="openColManager()" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Manage Columns
  </button>
</nav>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar" style="display:none">
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Quick filter all columns…" oninput="gridApi.setGridOption('quickFilterText', this.value)"/>
  </div>
  <div class="tool-sep"></div>
  <div class="col-chips" id="col-chips"></div>
  <div class="tool-sep"></div>
  <div class="stats-label" id="stats-label">Loading…</div>
</div>

<!-- GRID AREA -->
<div class="grid-wrap">
  <!-- EMPTY STATE -->
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <p>Loading <strong>Datasets_Catalogue.csv</strong>…</p>
  </div>

  <div id="myGrid" class="ag-theme-quartz" style="display:none; flex:1;"></div>
</div>

<div class="toast" id="toast"></div>

<!-- COLUMN MANAGER MODAL -->
<div class="overlay" id="col-overlay">
  <div class="modal">
    <h2>Manage Columns</h2>
    <p>Check or uncheck columns to show or hide them in the grid.</p>
    <div id="col-manager-list" style="display:flex;flex-direction:column;gap:0.4rem;max-height:340px;overflow-y:auto;margin-top:0.5rem;"></div>
    <div class="modal-footer">
      <button class="nav-btn" onclick="document.getElementById('col-overlay').classList.remove('open')">Close</button>
      <button class="nav-btn primary" onclick="showAllColumns()">Show All</button>
    </div>
  </div>
</div>

<!-- ROW MANAGER MODAL -->
<div class="overlay" id="row-overlay">
  <div class="modal" style="width:600px;">
    <h2>Manage Rows</h2>
    <p>Rows removed with ✕ appear here. Check to restore them to the grid.</p>
    <div id="row-manager-search" style="margin-bottom:0.6rem;">
      <div class="search-box" style="flex:1;max-width:100%;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search removed rows…" oninput="filterRemovedRows(this.value)" style="width:100%;"/>
      </div>
    </div>
    <div id="row-manager-list" style="display:flex;flex-direction:column;gap:0.4rem;max-height:340px;overflow-y:auto;margin-top:0.5rem;"></div>
    <div id="row-manager-empty" style="display:none;text-align:center;padding:2rem;color:#9ca3af;font-size:0.82rem;">No removed rows yet. Use ✕ on a row to remove it.</div>
    <div class="modal-footer">
      <button class="nav-btn" onclick="document.getElementById('row-overlay').classList.remove('open')">Close</button>
      <button class="nav-btn primary" onclick="restoreAllRows()">Restore All</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────
let gridApi;
let columnDefs = [];
let rowIdCounter = 1000;
let currentHeaders = [];
let removedRows = []; // track rows removed via ✕

// ── CSV PARSER (RFC 4180 — handles quoted fields with commas/newlines) ────
function detectDelimiter(text) {
  const firstLine = text.split(/\r?\n/)[0];
  const semicolons = (firstLine.match(/;/g) || []).length;
  const commas = (firstLine.match(/,/g) || []).length;
  const tabs = (firstLine.match(/\t/g) || []).length;
  if (semicolons >= commas && semicolons >= tabs) return ';';
  if (tabs > commas) return '\t';
  return ',';
}

// Splits a single CSV line respecting double-quoted fields.
function splitLine(line, delim) {
  const fields = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = false;
      } else {
        cur += ch;
      }
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === delim) { fields.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
  }
  fields.push(cur.trim());
  return fields;
}

function parseCSV(text) {
  const delim = detectDelimiter(text);
  // Reassemble lines while respecting quoted newlines
  const rawLines = [];
  let buf = '';
  let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQ = !inQ; buf += ch; }
    else if (!inQ && (ch === '\n' || (ch === '\r' && text[i+1] === '\n'))) {
      if (ch === '\r') i++; // skip \n of \r\n
      if (buf.trim()) rawLines.push(buf);
      buf = '';
    } else { buf += ch; }
  }
  if (buf.trim()) rawLines.push(buf);

  const headers = splitLine(rawLines[0], delim);
  const rows = rawLines.slice(1).map(line => {
    const vals = splitLine(line, delim);
    const row = { _rowId: ++rowIdCounter };
    headers.forEach((h, i) => { row[h] = vals[i] !== undefined ? vals[i] : ''; });
    return row;
  });
  return { headers, rows };
}

function inferType(key, rows) {
  const sample = rows.slice(0, 10).map(r => r[key]).filter(v => v !== '' && v != null);
  if (sample.length === 0) return 'text';
  if (sample.every(v => !isNaN(+v) && v !== '')) return 'number';
  return 'text';
}

// ── COLUMN BUILDERS ───────────────────────────────────────
function buildColDefs(headers, rows) {
  return headers.map((h, idx) => {
    const type = inferType(h, rows);
    const base = {
      field: h,
      headerName: h,
      sortable: true,
      filter: true,
      resizable: true,
      minWidth: 100,
      // Pin the first column (Name) to the left
      ...(idx === 0 ? { pinned: 'left', minWidth: 140 } : {}),
    };
    if (type === 'number') {
      Object.assign(base, {
        type: 'numericColumn',
        filter: 'agNumberColumnFilter',
        valueFormatter: p => {
          if (p.value == null || p.value === '') return '—';
          return Number(p.value).toLocaleString();
        }
      });
    }
    return base;
  });
}

// ── LOAD DATA ─────────────────────────────────────────────
function loadData(csvText) {
  const { headers, rows } = parseCSV(csvText);
  currentHeaders = headers;
  columnDefs = buildColDefs(headers, rows);

  // Show grid, hide empty state
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('myGrid').style.display = '';
  document.getElementById('toolbar').style.display = '';
  document.getElementById('export-btn').style.display = '';
  document.getElementById('row-mgr-btn').style.display = '';
  document.getElementById('col-mgr-btn').style.display = '';

  if (gridApi) {
    // Grid already exists — update it
    const allColDefs = [
      ...columnDefs,
      actionsColDef(),
    ];
    gridApi.setGridOption('columnDefs', allColDefs);
    gridApi.setGridOption('rowData', rows);
    renderChips(headers);
    updateStats();
    showToast(`Loaded ${rows.length} rows · ${headers.length} columns`);
  } else {
    // First load — init grid
    initGrid(headers, rows);
  }
}

// ── ACTIONS COLUMN DEF ────────────────────────────────────
function actionsColDef() {
  return {
    headerName: '',
    field: '_actions',
    width: 52,
    minWidth: 52,
    maxWidth: 52,
    sortable: false,
    filter: false,
    resizable: false,
    suppressMovable: true,
    cellRenderer: p => {
      const btn = document.createElement('button');
      btn.innerHTML = '✕';
      btn.style.cssText = 'background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:2px 4px;border-radius:4px;transition:color .12s';
      btn.onmouseover = () => btn.style.color = '#ef4444';
      btn.onmouseleave = () => btn.style.color = '#d1d5db';
      btn.onclick = () => {
        removedRows.push({ ...p.data });
        gridApi.applyTransaction({ remove: [p.data] });
        updateStats();
        showToast('Row removed — restore via Manage Rows');
      };
      return btn;
    }
  };
}

// ── CHIP TOGGLES ──────────────────────────────────────────
function renderChips(headers) {
  const cols = gridApi
    ? gridApi.getColumns().filter(c => c.getColId() !== '_actions')
    : [];
  const list = headers
    ? headers.map(h => ({ id: h, label: h, visible: true }))
    : cols.map(c => ({ id: c.getColId(), label: c.getColDef().headerName || c.getColId(), visible: c.isVisible() }));

  const wrap = document.getElementById('col-chips');
  wrap.innerHTML = list.map(c => `
    <div class="col-chip ${c.visible ? 'on' : ''}" id="chip-${CSS.escape(c.id)}" onclick="toggleColumn('${c.id.replace(/'/g, "\\'")}')">
      <span class="chip-dot"></span>${c.label}
    </div>`).join('');
}

function toggleColumn(field) {
  const col = gridApi.getColumn(field);
  if (!col) return;
  const nowVisible = !col.isVisible();
  gridApi.setColumnsVisible([field], nowVisible);
  const chip = document.getElementById(`chip-${CSS.escape(field)}`);
  if (chip) chip.classList.toggle('on', nowVisible);
  updateStats();
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  if (!gridApi) return;
  const displayed = gridApi.getDisplayedRowCount();
  const total = gridApi.getGridOption('rowData')?.length || 0;
  const visibleCols = gridApi.getAllDisplayedColumns().filter(c => c.getColId() !== '_actions').length;
  const totalCols = currentHeaders.length;
  document.getElementById('stats-label').innerHTML =
    `<strong>${displayed}</strong> of ${total} rows &nbsp;·&nbsp; <strong>${visibleCols}</strong> of ${totalCols} columns`;
}

// ── ROW MANAGER ───────────────────────────────────────────
let rowManagerFilter = '';

function openRowManager() {
  renderRowManagerList();
  document.getElementById('row-overlay').classList.add('open');
}

function filterRemovedRows(val) {
  rowManagerFilter = val.toLowerCase();
  renderRowManagerList();
}

function renderRowManagerList() {
  const list = document.getElementById('row-manager-list');
  const empty = document.getElementById('row-manager-empty');
  const filtered = removedRows.filter(row => {
    if (!rowManagerFilter) return true;
    return Object.values(row).some(v => String(v).toLowerCase().includes(rowManagerFilter));
  });

  if (removedRows.length === 0) {
    list.innerHTML = '';
    list.style.display = 'none';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'flex';

  // Show first two header values as a label
  list.innerHTML = filtered.map((row, idx) => {
    const realIdx = removedRows.indexOf(row);
    const preview = currentHeaders.slice(0, 2).map(h => row[h] || '—').join(' · ');
    const escapedPreview = preview.replace(/</g, '&lt;');
    return `<label style="display:flex;align-items:center;gap:0.65rem;padding:0.5rem 0.75rem;background:#fff8f8;border:1px solid #fde8e8;border-radius:6px;cursor:pointer;">
      <input type="checkbox" onchange="toggleRestoreRow(${realIdx}, this.checked)" style="width:15px;height:15px;cursor:pointer;accent-color:#0066ff;"/>
      <span style="font-size:0.82rem;color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapedPreview}">${escapedPreview}</span>
      <button onclick="restoreSingleRow(${realIdx})" style="background:#0066ff;color:#fff;border:none;border-radius:5px;padding:0.25rem 0.6rem;font-size:0.72rem;cursor:pointer;white-space:nowrap;">Restore</button>
    </label>`;
  }).join('');
}

function toggleRestoreRow(idx, checked) {
  // reserved for bulk-restore if needed
}

function restoreSingleRow(idx) {
  const row = removedRows[idx];
  if (!row) return;
  gridApi.applyTransaction({ add: [row] });
  removedRows.splice(idx, 1);
  updateStats();
  showToast('Row restored');
  renderRowManagerList();
}

function restoreAllRows() {
  if (removedRows.length === 0) return;
  gridApi.applyTransaction({ add: [...removedRows] });
  removedRows = [];
  updateStats();
  showToast('All rows restored');
  renderRowManagerList();
}

// ── EMBEDDED CSV DATA (Datasets_Catalogue.csv) ────────────
const EMBEDDED_CSV = `Name,year,subjects,recordings,scoring,age range,gender (m/f),BMI\r\nABC,2011-2014,49,132,AASM,27-65 (48.8 pm 9.9),28/21,38.9 pm 3.0\r\nANPHY,2024,29,29,AASM,32 pm 6,16/13,<30 (exclusion criteria)\r\nAPOE,2003-2007,712,712,R&K,13-90 (45.7 pm 13.6),421/291,27.3 pm 7.0\r\nAPPLES,2003-2008,1516,1104,R&K,18-84 (50.1 pm 12.9),958/558,32.1 pm 7.8\r\nBESTAIR,2011-2014,169,518,"AASM (home sleep test, not reliable)",46-77 (64.3 pm 7.4),110/59,31.7 pm 5.9\r\nCAPSLPDB,2012,108,108,R&K,14-82 (49.2 pm 19.7),66/42,-\r\nCCSHS,2006-2010,517,515,AASM,16-19 (17.7 pm 0.4),261/256,25.1 pm 5.9\r\nCFS,1990-2006,735,730,R&K,7-89 (43.3 pm 19.9),329/406,32.4 pm 9.5\r\nCHAT,2007-2012,464,1639,AASM,5-10.5 (7.3 pm 1.4),219/234,19.0 pm 4.9\r\nCPS,2021-2022,113,113,AASM,"71% of participants are >50, age not known for all participants",45/17 (gender info is not available for all patients),"42% of participants are >30, BMI not known for all participants"\r\nDCSM,2015-2018,255,255,AASM,-,-,-\r\nDOD-H,2020,25,25,AASM,35.3 pm 7.5,16/9,23.8 pm 3.4\r\nDOD-O,2020,55,56,AASM,45.6 pm 16.5,35/20,29.6 pm 6.4\r\nDREAMT,2022,100,100,AASM,56 pm 17,45/55,33.7 pm 8.6\r\nEESM17,2017,9,9,AASM,26-44,6/3,-\r\nEESM19,2019,20,80,"AASM (80/200 have full PSG, therefore only those have scoring)",23-36 (mean 25.9),7/13,-`;

async function autoLoadCSV() {
  try {
    const resp = await fetch('Datasets_Catalogue.csv');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    loadData(text);
  } catch (_) {
    // fetch blocked (local file://) or file not found — use embedded fallback
    loadData(EMBEDDED_CSV);
  }
}

// ── EXPORT ────────────────────────────────────────────────
function exportCSV() {
  gridApi.exportDataAsCsv({ fileName: 'pillowcase.csv' });
  showToast('CSV exported');
}

// ── TOAST ─────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── COLUMN MANAGER ────────────────────────────────────────
function openColManager() {
  const list = document.getElementById('col-manager-list');
  const cols = gridApi.getColumns().filter(c => c.getColId() !== '_actions');
  list.innerHTML = cols.map(col => {
    const id = col.getColId();
    const visible = col.isVisible();
    // escape id for use in JS string attribute
    const escapedId = id.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<label style="display:flex;align-items:center;gap:0.65rem;padding:0.5rem 0.75rem;background:#f9fafb;border:1px solid #e2e4e9;border-radius:6px;cursor:pointer;">
      <input type="checkbox" ${visible ? 'checked' : ''} onchange="gridApi.setColumnsVisible(['${escapedId}'], this.checked); renderChips(null); updateStats();" style="width:15px;height:15px;cursor:pointer;accent-color:#0066ff;"/>
      <span style="font-size:0.82rem;">${col.getColDef().headerName || id}</span>
    </label>`;
  }).join('');
  document.getElementById('col-overlay').classList.add('open');
}

function showAllColumns() {
  const cols = gridApi.getColumns().filter(c => c.getColId() !== '_actions').map(c => c.getColId());
  gridApi.setColumnsVisible(cols, true);
  renderChips(null);
  updateStats();
  openColManager();
}

// ── INIT AG GRID ──────────────────────────────────────────
function initGrid(headers, rows) {
  const gridOptions = {
    columnDefs: [
      ...columnDefs,
      actionsColDef(),
    ],
    rowData: rows,
    defaultColDef: {
      flex: 1,
      minWidth: 100,
      resizable: true,
      sortable: true,
      filter: true,
    },
    animateRows: true,
    rowSelection: 'multiple',
    suppressRowClickSelection: true,
    pagination: true,
    paginationPageSize: 20,
    paginationPageSizeSelector: [10, 20, 50, 100],
    onGridReady: params => {
      gridApi = params.api;
      renderChips(headers);
      updateStats();
    },
    onFilterChanged: updateStats,
    onColumnVisible: updateStats,
    getRowId: p => String(p.data._rowId || Math.random()),
  };

  agGrid.createGrid(document.getElementById('myGrid'), gridOptions);
}

// ── BOOT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // close modals on backdrop click
  ['col-overlay', 'row-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) e.target.classList.remove('open');
    });
  });

  // Auto-load the hard-coded CSV
  autoLoadCSV();
});
</script>
</body>
